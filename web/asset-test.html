<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Test — Agents of Dynasties</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 2rem 0 1rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.5rem;
    }

    h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-right: 0.25rem;
    }

    .toggle-group {
      display: flex;
      gap: 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #444;
    }

    .toggle-group button {
      background: #222;
      color: #888;
      border: none;
      padding: 3px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-group button:not(:last-child) { border-right: 1px solid #444; }

    .toggle-group button.active {
      background: #3a5fa0;
      color: #fff;
    }

    /* Walk direction toggle shows as a slightly different colour */
    .dir-toggle button.active { background: #3a7050; }

    /* Variant colour toggle */
    .variant-toggle button.active { background: #5a3a80; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1e1e1e;
      border-radius: 8px;
      padding: 0.75rem;
      border: 2px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }
    .card.ok    { border-color: #2d6a2d; }
    .card.error { border-color: #8b2020; }

    /* static image cards */
    .img-wrap {
      width: 96px;
      height: 96px;
      background: #2a2a2a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* animated sprite canvas cards */
    .sprite-wrap {
      width: 160px;
      height: 160px;
      background: #1a2030;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .sprite-wrap canvas {
      display: block;
      image-rendering: pixelated;
    }

    .badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.missing { background: #8b2020; color: #fcc; }
    .badge.ok      { background: #2d6a2d; color: #afa; }
    .badge.loading { background: #555; color: #ccc; }

    .card-name {
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
    }

    .card-path {
      font-size: 0.65rem;
      color: #666;
      text-align: center;
      word-break: break-all;
    }

    .summary {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #888;
    }
    .summary .ok-count  { font-weight: 700; color: #5a5; }
    .summary .err-count { font-weight: 700; color: #c55; }

    /* per-card action availability chips */
    .action-tags {
      display: flex;
      gap: 0.28rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-chip {
      font-size: 0.55rem;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: #2a2a2a;
      color: #555;
      border: 1px solid transparent;
    }

    /* action is available in meta */
    .action-chip.has { background: #1a3a1a; color: #5a9; }

    /* currently selected action */
    .action-chip.selected { border-color: #4a8adb; }

    /* selected but NOT available (falling back to idle) */
    .action-chip.selected:not(.has) { border-color: #8b6020; color: #a87; }
  </style>
</head>
<body>

<h1>Asset Test</h1>
<p class="subtitle">Each card shows the expected asset path. Red = missing. Green = loaded.</p>

<!-- Animated Sprites -->
<div class="section-header">
  <h2>Sprites (Animated)</h2>
  <div class="toggle-group" id="sprites-faction-toggle">
    <button class="active" data-faction="linux"     onclick="switchSpriteFaction('linux')">Linux</button>
    <button               data-faction="microsoft"  onclick="switchSpriteFaction('microsoft')">Microsoft</button>
  </div>
  <div class="toggle-group" id="sprites-action-toggle">
    <button class="active" data-action="idle"   onclick="setSpriteAction('idle')"  >Idle</button>
    <button               data-action="walk"   onclick="setSpriteAction('walk')"  >Walk</button>
    <button               data-action="work"   onclick="setSpriteAction('work')"  >Work</button>
    <button               data-action="attack" onclick="setSpriteAction('attack')">Attack</button>
  </div>
  <div class="toggle-group dir-toggle" id="sprites-dir-toggle" style="display:none">
    <button data-dir="down"  onclick="setSpriteWalkDir('down')" >↓</button>
    <button data-dir="up"    onclick="setSpriteWalkDir('up')"   >↑</button>
    <button data-dir="left"  onclick="setSpriteWalkDir('left')" >←</button>
    <button data-dir="right" onclick="setSpriteWalkDir('right')">→</button>
  </div>
  <div class="toggle-group variant-toggle" id="sprites-variant-toggle">
    <button class="active" data-variant="blue"   onclick="setSpriteVariant('blue')"  >Blue</button>
    <button               data-variant="red"    onclick="setSpriteVariant('red')"   >Red</button>
    <button               data-variant="green"  onclick="setSpriteVariant('green')" >Green</button>
    <button               data-variant="purple" onclick="setSpriteVariant('purple')">Purple</button>
  </div>
</div>
<div class="grid" id="sprites-grid"></div>

<!-- Buildings -->
<div class="section-header">
  <h2>Buildings</h2>
  <div class="toggle-group" id="buildings-faction-toggle">
    <button class="active" data-faction="linux"    onclick="switchBuildingFaction('linux')"    >Linux</button>
    <button               data-faction="microsoft" onclick="switchBuildingFaction('microsoft')">Microsoft</button>
  </div>
  <div class="toggle-group" id="buildings-state-toggle">
    <button class="active" data-state="idle"    onclick="switchBuildingState('idle')"   >Idle</button>
    <button               data-state="damaged"  onclick="switchBuildingState('damaged')" >Damaged</button>
    <button               data-state="burning"  onclick="switchBuildingState('burning')" >Burning</button>
  </div>
</div>
<div class="grid" id="buildings-grid"></div>

<!-- Terrain -->
<div class="section-header">
  <h2>Terrain</h2>
</div>
<div class="grid" id="terrain-grid"></div>

<p class="summary" id="summary"></p>

<script src="/shared-map.js"></script>
<script>
  const UNITS = [
    { kind: 'villager',      label: 'Villager' },
    { kind: 'infantry',      label: 'Infantry' },
    { kind: 'spearman',      label: 'Spearman' },
    { kind: 'scout_cavalry', label: 'Scout Cavalry' },
    { kind: 'paladin',       label: 'Paladin' },
    { kind: 'archer',        label: 'Archer' },
  ];

  const BUILDINGS = [
    { kind: 'town_center',   label: 'Town Center' },
    { kind: 'barracks',      label: 'Barracks' },
    { kind: 'stable',        label: 'Stable' },
    { kind: 'archery_range', label: 'Archery Range' },
  ];

  const TERRAIN = [
    { kind: 'plain',      label: 'Plain' },
    { kind: 'forest',     label: 'Forest' },
    { kind: 'mountain',   label: 'Mountain' },
    { kind: 'lake',       label: 'Lake' },
    { kind: 'gold_mine',  label: 'Gold Mine' },
    { kind: 'stone_mine', label: 'Stone Mine' },
    { kind: 'orchard',    label: 'Orchard' },
    { kind: 'deer',       label: 'Deer' },
  ];

  // ── Animated sprite section ────────────────────────────────────────────────

  const spriteImages = {};
  const spriteMeta = {};

  let spriteFaction = 'linux';
  let spriteAction = 'idle';     // 'idle' | 'walk' | 'work'
  let spriteWalkDir = { dq: 0, dr: 1 };  // default: down
  let spriteVariant = 'blue';
  let spriteRafId = null;

  const spriteCards = [];  // { canvas, kind, badge, card, pathEl }

  const ALL_ACTIONS = ['idle', 'walk', 'work', 'attack'];
  const ACTION_TO_STATUS = { idle: 'IDLE', walk: 'MOVING_FAST', work: 'GATHERING', attack: 'ATTACKING' };
  const DIR_TO_DELTA = {
    down:  { dq: 0,  dr: 1  },
    up:    { dq: 0,  dr: -1 },
    left:  { dq: -1, dr: 0  },
    right: { dq: 1,  dr: 0  },
  };

  function makeFakeUnit(kind) {
    return {
      kind,
      team: spriteFaction === 'linux' ? 1 : 2,
      status: ACTION_TO_STATUS[spriteAction] || 'IDLE',
      position: { q: 0, r: 0 },
      // multiply by 10 so walkRow direction detection is unambiguous
      status_target_coord: { q: spriteWalkDir.dq * 10, r: spriteWalkDir.dr * 10 },
    };
  }

  function makeFakeTeamData() {
    return {
      appearance: { faction: spriteFaction, variant: spriteVariant },
      units: [{ team: spriteFaction === 'linux' ? 1 : 2 }],
    };
  }

  // Draw one unit sprite into its canvas.
  // Positions cy so the full 256-row frame fits within the canvas height.
  function drawSpriteCanvas(canvas, kind) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const meta = spriteMeta[`${spriteFaction}/${kind}`];
    const baselineY = meta?.frame_spec?.baseline_y ?? 220;
    const frameH   = meta?.frame_spec?.frame_height ?? 256;

    const sz = canvas.width;
    const cx = sz / 2;
    const cy = Math.round((baselineY / frameH) * sz);

    const moveDir = spriteAction === 'walk' ? spriteWalkDir : null;

    return AODMapUI.drawAnimatedUnitSprite(
      ctx, spriteImages, spriteMeta,
      makeFakeUnit(kind), makeFakeTeamData(),
      cx, cy, sz, moveDir,
    );
  }

  function buildSpriteGrid() {
    const grid = document.getElementById('sprites-grid');
    grid.innerHTML = '';
    spriteCards.length = 0;

    for (const unit of UNITS) {
      const card = document.createElement('div');
      card.className = 'card';

      const wrap = document.createElement('div');
      wrap.className = 'sprite-wrap';

      const canvas = document.createElement('canvas');
      canvas.width = 160;
      canvas.height = 160;

      const badge = document.createElement('span');
      badge.className = 'badge loading';
      badge.textContent = 'Loading';

      wrap.appendChild(canvas);
      wrap.appendChild(badge);

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = unit.label;

      const pathEl = document.createElement('div');
      pathEl.className = 'card-path';

      const actionTags = document.createElement('div');
      actionTags.className = 'action-tags';
      for (const a of ALL_ACTIONS) {
        const chip = document.createElement('span');
        chip.className = 'action-chip';
        chip.dataset.action = a;
        chip.textContent = a;
        actionTags.appendChild(chip);
      }

      card.appendChild(wrap);
      card.appendChild(name);
      card.appendChild(pathEl);
      card.appendChild(actionTags);
      grid.appendChild(card);

      spriteCards.push({ canvas, kind: unit.kind, badge, card, pathEl, actionTags });
    }

    refreshSpriteBadges();
  }

  function refreshSpriteBadges() {
    for (const { kind, badge, card, pathEl, actionTags } of spriteCards) {
      const meta  = spriteMeta[`${spriteFaction}/${kind}`];
      const atlas = meta ? spriteImages[meta.atlas.image] : null;
      pathEl.textContent = `assets/sprites/${spriteFaction}/${kind}/atlas.png`;

      if (atlas) {
        card.classList.add('ok');
        card.classList.remove('error');
        badge.className = 'badge ok';
        badge.textContent = 'OK';
      } else {
        card.classList.add('error');
        card.classList.remove('ok');
        badge.className = 'badge missing';
        badge.textContent = 'Missing';
      }

      // Update action availability chips.
      for (const chip of actionTags.querySelectorAll('.action-chip')) {
        const a = chip.dataset.action;
        const hasAction = !!(meta?.actions?.[a]);
        chip.classList.toggle('has', hasAction);
        chip.classList.toggle('selected', a === spriteAction);
      }
    }
  }

  function startSpriteLoop() {
    if (spriteRafId !== null) return;
    const step = () => {
      spriteRafId = null;
      for (const { canvas, kind } of spriteCards) {
        const meta = spriteMeta[`${spriteFaction}/${kind}`];
        if (meta && spriteImages[meta.atlas.image]) {
          drawSpriteCanvas(canvas, kind);
        }
      }
      spriteRafId = requestAnimationFrame(step);
    };
    spriteRafId = requestAnimationFrame(step);
  }

  // ── Sprite controls ────────────────────────────────────────────────────────

  function switchSpriteFaction(faction) {
    spriteFaction = faction;
    document.querySelectorAll('#sprites-faction-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.faction === faction);
    });
    // Sync default variant to match faction colour convention.
    const defaultVariant = faction === 'linux' ? 'blue' : 'red';
    setSpriteVariant(defaultVariant);
    refreshSpriteBadges();
  }

  function setSpriteAction(action) {
    spriteAction = action;
    document.querySelectorAll('#sprites-action-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.action === action);
    });
    // Walk direction is only meaningful for walk action.
    document.getElementById('sprites-dir-toggle').style.display =
      action === 'walk' ? 'flex' : 'none';
    // Refresh per-card action chips to reflect new selection.
    refreshSpriteBadges();
  }

  function setSpriteWalkDir(dirName) {
    spriteWalkDir = DIR_TO_DELTA[dirName] || DIR_TO_DELTA.down;
    document.querySelectorAll('#sprites-dir-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.dir === dirName);
    });
  }

  function setSpriteVariant(variant) {
    spriteVariant = variant;
    document.querySelectorAll('#sprites-variant-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.variant === variant);
    });
  }

  // Set initial walk-dir button state (down is default).
  document.querySelector('#sprites-dir-toggle button[data-dir="down"]').classList.add('active');

  // ── Static image sections (buildings + terrain) ────────────────────────────

  const imgCounts = {};

  function imgKey(section, team) {
    return team ? `${section}-${team}` : section;
  }

  function updateSummary() {
    const total = TERRAIN.length;
    const loaded = TERRAIN.filter((t) => terrainImages[terrainCardPath(t.kind)]).length;
    document.getElementById('summary').innerHTML =
      `<span class="ok-count">${loaded} / ${total}</span> terrain assets found &nbsp;|&nbsp; ` +
      `<span class="err-count">${total - loaded}</span> missing`;
  }

  function makeStaticCard(entity, pathPrefix, section, team) {
    const path = `${pathPrefix}${entity.kind}.png`;
    const k = imgKey(section, team);
    imgCounts[k] = imgCounts[k] ?? { total: 0, loaded: 0 };
    imgCounts[k].total++;

    const card = document.createElement('div');
    card.className = 'card';

    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';

    const img = document.createElement('img');
    img.alt = entity.label;
    img.src = path;

    const badge = document.createElement('span');
    badge.className = 'badge missing';
    badge.textContent = 'Missing';

    img.onload = () => {
      card.classList.add('ok');
      badge.className = 'badge ok';
      badge.textContent = 'OK';
      imgCounts[k].loaded++;
      updateSummary();
    };
    img.onerror = () => {
      card.classList.add('error');
      updateSummary();
    };

    wrap.appendChild(img);
    wrap.appendChild(badge);

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = entity.label;

    const pathEl = document.createElement('div');
    pathEl.className = 'card-path';
    pathEl.textContent = path;

    card.appendChild(wrap);
    card.appendChild(name);
    card.appendChild(pathEl);
    return card;
  }

  // ── Building sprite section ────────────────────────────────────────────────
  // Sprite sheet layout: 1536×1024, 3 cols × 2 rows of 512×512 frames at 8 fps.

  const BLDG_FRAME_SZ = 1024;
  const BLDG_COLS = 2;
  const BLDG_FPS = 4;
  const BLDG_TOTAL_FRAMES = 4;
  // Sprite content starts at ~52% from top of frame; shift up so building is centred in card.
  const BLDG_OFFSET_Y_RATIO = -0.25;

  const buildingImages = {};
  let buildingFaction = 'linux';
  let buildingState = 'idle';
  let buildingRafId = null;

  // { kind, canvas, badge, card, pathEl } for each card
  const buildingCards = [];

  function buildingCardPath(kind) {
    return `assets/sprites/buildings/${buildingFaction}/${kind}/${buildingState}.png`;
  }

  function initBuildingSection() {
    const grid = document.getElementById('buildings-grid');
    grid.innerHTML = '';
    buildingCards.length = 0;

    for (const building of BUILDINGS) {
      const card = document.createElement('div');
      card.className = 'card';

      const wrap = document.createElement('div');
      wrap.className = 'sprite-wrap';

      const canvas = document.createElement('canvas');
      canvas.width = 160;
      canvas.height = 160;

      const badge = document.createElement('span');
      badge.className = 'badge loading';
      badge.textContent = 'Loading';

      wrap.appendChild(canvas);
      wrap.appendChild(badge);

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = building.label;

      const pathEl = document.createElement('div');
      pathEl.className = 'card-path';

      card.appendChild(wrap);
      card.appendChild(name);
      card.appendChild(pathEl);
      grid.appendChild(card);

      buildingCards.push({ kind: building.kind, canvas, badge, card, pathEl });
    }

    loadBuildingImages();
  }

  function loadBuildingImages() {
    const factions = ['linux', 'microsoft'];
    const states = ['idle', 'damaged', 'burning'];
    const tasks = [];
    for (const faction of factions) {
      for (const bld of BUILDINGS) {
        for (const st of states) {
          const path = `assets/sprites/buildings/${faction}/${bld.kind}/${st}.png`;
          if (!buildingImages[path]) {
            tasks.push(new Promise((resolve) => {
              const img = new Image();
              img.onload = () => { buildingImages[path] = img; resolve(); };
              img.onerror = () => resolve();
              img.src = path;
            }));
          }
        }
      }
    }
    Promise.all(tasks).then(() => {
      refreshBuildingBadges();
      startBuildingLoop();
    });
  }

  function refreshBuildingBadges() {
    for (const { kind, badge, card, pathEl } of buildingCards) {
      const path = buildingCardPath(kind);
      pathEl.textContent = path;
      if (buildingImages[path]) {
        card.classList.add('ok');
        card.classList.remove('error');
        badge.className = 'badge ok';
        badge.textContent = 'OK';
      } else {
        card.classList.remove('ok');
        card.classList.add('error');
        badge.className = 'badge missing';
        badge.textContent = 'Missing';
      }
    }
  }

  function drawBuildingCanvas(canvas, kind) {
    const path = buildingCardPath(kind);
    const img = buildingImages[path];
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!img) return false;
    const frameIdx = Math.floor((performance.now() / 1000) * BLDG_FPS) % BLDG_TOTAL_FRAMES;
    const col = frameIdx % BLDG_COLS;
    const row = Math.floor(frameIdx / BLDG_COLS);
    const sz = canvas.width;
    const offsetY = Math.round(sz * BLDG_OFFSET_Y_RATIO);
    ctx.drawImage(img, col * BLDG_FRAME_SZ, row * BLDG_FRAME_SZ, BLDG_FRAME_SZ, BLDG_FRAME_SZ, 0, offsetY, sz, sz);
    return true;
  }

  function startBuildingLoop() {
    if (buildingRafId !== null) return;
    const step = () => {
      buildingRafId = null;
      for (const { canvas, kind } of buildingCards) {
        drawBuildingCanvas(canvas, kind);
      }
      buildingRafId = requestAnimationFrame(step);
    };
    buildingRafId = requestAnimationFrame(step);
  }

  function switchBuildingFaction(faction) {
    buildingFaction = faction;
    document.querySelectorAll('#buildings-faction-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.faction === faction);
    });
    refreshBuildingBadges();
  }

  function switchBuildingState(state) {
    buildingState = state;
    document.querySelectorAll('#buildings-state-toggle button').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.state === state);
    });
    refreshBuildingBadges();
  }

  // ── Terrain sprite section ─────────────────────────────────────────────────

  const TERRAIN_FRAME_SZ = 1024;
  const TERRAIN_COLS = 2;
  const TERRAIN_FPS = 4;
  const TERRAIN_TOTAL_FRAMES = 4;
  // Content starts at ~21% from top of frame; small shift up to centre.
  const TERRAIN_OFFSET_Y_RATIO = -0.10;

  const terrainImages = {};
  let terrainRafId = null;
  const terrainCards = [];

  function terrainCardPath(kind) {
    return `assets/sprites/terrain/${kind}/atlas.png`;
  }

  function initTerrainSection() {
    const grid = document.getElementById('terrain-grid');
    grid.innerHTML = '';
    terrainCards.length = 0;

    for (const terrain of TERRAIN) {
      const card = document.createElement('div');
      card.className = 'card';

      const wrap = document.createElement('div');
      wrap.className = 'sprite-wrap';

      const canvas = document.createElement('canvas');
      canvas.width = 160;
      canvas.height = 160;

      const badge = document.createElement('span');
      badge.className = 'badge loading';
      badge.textContent = 'Loading';

      wrap.appendChild(canvas);
      wrap.appendChild(badge);

      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = terrain.label;

      const pathEl = document.createElement('div');
      pathEl.className = 'card-path';

      card.appendChild(wrap);
      card.appendChild(name);
      card.appendChild(pathEl);
      grid.appendChild(card);

      terrainCards.push({ kind: terrain.kind, canvas, badge, card, pathEl });
    }

    loadTerrainImages();
  }

  function loadTerrainImages() {
    const tasks = TERRAIN.map((t) => {
      const path = terrainCardPath(t.kind);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { terrainImages[path] = img; resolve(); };
        img.onerror = () => resolve();
        img.src = path;
      });
    });
    Promise.all(tasks).then(() => {
      refreshTerrainBadges();
      startTerrainLoop();
      updateSummary();
    });
  }

  function refreshTerrainBadges() {
    for (const { kind, badge, card, pathEl } of terrainCards) {
      const path = terrainCardPath(kind);
      pathEl.textContent = path;
      if (terrainImages[path]) {
        card.classList.add('ok');
        card.classList.remove('error');
        badge.className = 'badge ok';
        badge.textContent = 'OK';
      } else {
        card.classList.remove('ok');
        card.classList.add('error');
        badge.className = 'badge missing';
        badge.textContent = 'Missing';
      }
    }
  }

  function drawTerrainCanvas(canvas, kind) {
    const path = terrainCardPath(kind);
    const img = terrainImages[path];
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!img) return false;
    const frameIdx = Math.floor((performance.now() / 1000) * TERRAIN_FPS) % TERRAIN_TOTAL_FRAMES;
    const col = frameIdx % TERRAIN_COLS;
    const row = Math.floor(frameIdx / TERRAIN_COLS);
    const sz = canvas.width;
    const offsetY = Math.round(sz * TERRAIN_OFFSET_Y_RATIO);
    ctx.drawImage(img, col * TERRAIN_FRAME_SZ, row * TERRAIN_FRAME_SZ, TERRAIN_FRAME_SZ, TERRAIN_FRAME_SZ, 0, offsetY, sz, sz);
    return true;
  }

  function startTerrainLoop() {
    if (terrainRafId !== null) return;
    const step = () => {
      terrainRafId = null;
      for (const { canvas, kind } of terrainCards) {
        drawTerrainCanvas(canvas, kind);
      }
      terrainRafId = requestAnimationFrame(step);
    };
    terrainRafId = requestAnimationFrame(step);
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  initBuildingSection();
  initTerrainSection();

  // Build sprite grid then load all atlas assets.
  buildSpriteGrid();
  AODMapUI.preloadAssets(spriteImages, {
    unitKinds: UNITS.map((u) => u.kind),
    unitFactions: ['linux', 'microsoft'],
    spriteMeta,
  }).then(() => {
    refreshSpriteBadges();
    startSpriteLoop();
  });
</script>
