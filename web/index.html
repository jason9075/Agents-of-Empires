<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battle Monitor — Agents of Dynasties</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --c1: #4a90e2;
        --c2: #e25050;
        --bg: #0d0d0d;
        --panel: #161616;
        --border: #2a2a2a;
        --glass-base: rgba(14, 18, 22, 0.38);
        --glass-strong: rgba(28, 36, 44, 0.26);
        --glass-border: rgba(255, 255, 255, 0.16);
      }

      body {
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: #ddd;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Top bar ── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 0.5rem 1rem;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      #topbar h1 {
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #bbb;
      }

      .tick-badge {
        font-size: 0.8rem;
        color: #888;
      }

      .tick-badge span {
        font-weight: 700;
        color: #eee;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #555;
        transition: background 0.3s;
      }

      .dot.live {
        background: #4caf50;
        box-shadow: 0 0 6px #4caf50;
      }

      #refresh-btn {
        background: #222;
        border: 1px solid #444;
        color: #aaa;
        padding: 3px 10px;
        width: auto;
        min-width: 70px;
        height: auto;
        border-radius: 5px;
        font-size: 0.75rem;
        cursor: pointer;
        flex: 0 0 auto;
      }

      #refresh-btn:hover {
        background: #2d2d2d;
        color: #fff;
      }

      /* ── Zoom controls ── */
      .zoom-controls {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-left: auto;
        justify-content: flex-end;
        flex-shrink: 0;
      }

      .zoom-controls button:not(#refresh-btn) {
        background: #222;
        border: 1px solid #444;
        color: #ccc;
        width: 22px;
        height: 22px;
        border-radius: 4px;
        font-size: 0.9rem;
        line-height: 1;
        cursor: pointer;
        flex-shrink: 0;
      }

      .zoom-controls button:not(#refresh-btn):hover {
        background: #333;
        color: #fff;
      }

      #zoom-slider {
        width: 90px;
        min-width: 90px;
        accent-color: #4a90e2;
        cursor: pointer;
      }

      #zoom-label {
        font-size: 0.75rem;
        color: #888;
        width: 3rem;
        text-align: right;
      }

      /* ── Main layout ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      /* ── Canvas area ── */
      #canvas-wrap {
        flex: 1;
        overflow: auto;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        padding: 1rem;
      }

      #map-canvas {
        cursor: grab;
        display: block;
      }

      /* ── Sidebar ── */
      #sidebar {
        width: 220px;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 20;
        border-left: 1px solid var(--glass-border);
        background-color: var(--glass-base);
        background-image: linear-gradient(
          180deg,
          var(--glass-strong),
          rgba(8, 10, 12, 0.16)
        );
        backdrop-filter: blur(14px) saturate(1.1);
        -webkit-backdrop-filter: blur(14px) saturate(1.1);
        box-shadow: -16px 0 40px rgba(0, 0, 0, 0.28);
        display: flex;
        flex-direction: column;
        overflow-y: visible;
        isolation: isolate;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease,
          width 0.2s ease;
      }

      #sidebar.hidden {
        width: 0;
        opacity: 1;
        transform: translateX(0);
        border-left: none;
        overflow: visible;
        box-shadow: none;
      }

      #sidebar.hidden > :not(#sidebar-toggle) {
        display: none;
      }

      .team-panel {
        padding: 0.75rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .team-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.6rem;
      }

      .team-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .team-header h2 {
        font-size: 0.85rem;
        font-weight: 700;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: #999;
        margin-bottom: 0.2rem;
      }

      .stat-row span {
        color: #eee;
        font-weight: 600;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 0.5rem 0;
      }

      .unit-list {
        font-size: 0.7rem;
        color: #888;
      }

      .unit-row {
        display: flex;
        justify-content: space-between;
        padding: 1px 0;
      }

      /* ── Legend ── */
      #legend {
        padding: 0.75rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: auto;
      }

      #legend h3 {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #666;
        margin-bottom: 0.4rem;
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.68rem;
        color: #888;
        margin-bottom: 0.25rem;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        flex-shrink: 0;
      }

      /* ── Tooltip ── */
      #tooltip {
        position: fixed;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 0.4rem 0.6rem;
        font-size: 0.72rem;
        color: #ddd;
        pointer-events: none;
        display: none;
        z-index: 100;
        max-width: 180px;
        line-height: 1.5;
      }

      #sidebar-toggle {
        position: absolute;
        top: 1rem;
        right: 100%;
        width: 36px;
        height: 36px;
        min-height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--glass-base);
        background-image: linear-gradient(
          180deg,
          var(--glass-strong),
          rgba(8, 10, 12, 0.16)
        );
        backdrop-filter: blur(14px) saturate(1.1);
        -webkit-backdrop-filter: blur(14px) saturate(1.1);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-left: 1px solid rgba(255, 255, 255, 0.16);
        border-right: none;
        color: #ddd;
        padding: 0;
        border-radius: 10px 0 0 10px;
        font-size: 0.72rem;
        line-height: 1;
        cursor: pointer;
        font-size: 1.1rem;
        box-shadow: -10px 10px 24px rgba(0, 0, 0, 0.28);
        z-index: 25;
      }

      #sidebar-toggle:hover {
        background: linear-gradient(
          180deg,
          rgba(48, 56, 64, 0.96),
          rgba(26, 31, 36, 0.96)
        );
      }

      #sidebar.hidden #sidebar-toggle {
        right: 100%;
        width: 36px;
        height: 36px;
        min-height: 36px;
        border-radius: 10px 0 0 10px;
        overflow: visible;
      }

      @media (max-width: 900px) {
        #topbar {
          flex-wrap: wrap;
          align-items: flex-start;
          gap: 0.75rem;
        }

        .zoom-controls {
          margin-left: 0;
          width: 100%;
          justify-content: flex-start;
        }

        #sidebar {
          width: 210px;
        }
      }

      @media (max-width: 640px) {
        #sidebar-toggle {
          top: 0.75rem;
          right: 100%;
          width: 32px;
          height: 32px;
          min-height: 32px;
        }
      }
    </style>
  </head>

  <body>
    <div id="topbar">
      <h1>AGENTS OF DYNASTIES</h1>
      <div class="tick-badge">Tick <span id="tick-num">—</span></div>
      <div class="dot" id="live-dot" title="Live"></div>
      <div class="zoom-controls">
        <button onclick="adjustZoom(-0.25)" title="Zoom out">−</button>
        <input
          type="range"
          id="zoom-slider"
          min="0.4"
          max="2"
          step="0.2"
          value="1"
          oninput="setZoom(parseFloat(this.value))"
        />
        <button onclick="adjustZoom(+0.25)" title="Zoom in">+</button>
        <span id="zoom-label">100%</span>
        <button id="refresh-btn" onclick="fetchAndDraw()">Refresh</button>
      </div>
    </div>

    <div id="main">
      <div id="canvas-wrap">
        <canvas id="map-canvas"></canvas>
      </div>

      <div id="sidebar">
        <button
          id="sidebar-toggle"
          onclick="toggleSidebar()"
          aria-label="Hide sidebar"
          title="Toggle sidebar"
        >
          ❯
        </button>
        <!-- Team 1 -->
        <div class="team-panel">
          <div class="team-header">
            <div class="team-dot" style="background: var(--c1)"></div>
            <h2>Team 1</h2>
          </div>
          <div class="stat-row">Food <span id="t1-food">—</span></div>
          <div class="stat-row">Gold <span id="t1-gold">—</span></div>
          <div class="stat-row">Stone <span id="t1-stone">—</span></div>
          <div class="stat-row">Wood <span id="t1-wood">—</span></div>
          <hr class="divider" />
          <div class="stat-row">Units <span id="t1-units">—</span></div>
          <div class="stat-row">Buildings <span id="t1-buildings">—</span></div>
          <hr class="divider" />
          <div class="unit-list" id="t1-unit-list"></div>
        </div>

        <!-- Team 2 -->
        <div class="team-panel">
          <div class="team-header">
            <div class="team-dot" style="background: var(--c2)"></div>
            <h2>Team 2</h2>
          </div>
          <div class="stat-row">Food <span id="t2-food">—</span></div>
          <div class="stat-row">Gold <span id="t2-gold">—</span></div>
          <div class="stat-row">Stone <span id="t2-stone">—</span></div>
          <div class="stat-row">Wood <span id="t2-wood">—</span></div>
          <hr class="divider" />
          <div class="stat-row">Units <span id="t2-units">—</span></div>
          <div class="stat-row">Buildings <span id="t2-buildings">—</span></div>
          <hr class="divider" />
          <div class="unit-list" id="t2-unit-list"></div>
        </div>

        <!-- Legend -->
        <div id="legend">
          <h3>Terrain</h3>
          <div class="legend-row">
            <div class="swatch" style="background: #5a6e3a"></div>
            Plain
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #2d5a27"></div>
            Forest
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #6a5f52"></div>
            Mountain
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #2a5b8a"></div>
            Lake
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #c4a629"></div>
            Gold Mine
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #7a6e60"></div>
            Stone Mine
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #4a8a2a"></div>
            Orchard
          </div>
          <div class="legend-row">
            <div class="swatch" style="background: #5a8060"></div>
            Deer
          </div>
        </div>
      </div>
    </div>

    <div id="tooltip"></div>

    <script>
      // ── Constants ──────────────────────────────────────────────────────────────

      const HEX_SIZE = 50 // px, pointy-top
      const SQRT3 = Math.sqrt(3)
      const PAD = HEX_SIZE // canvas padding
      const TEAM_COLOR = { 1: '#4a90e2', 2: '#e25050' }
      const TERRAIN_COLOR = {
        plain: '#5a6e3a',
        forest: '#2d5a27',
        mountain: '#6a5f52',
        lake: '#2a5b8a',
        gold_mine: '#c4a629',
        stone_mine: '#7a6e60',
        orchard: '#4a8a2a',
        deer: '#5a8060',
      }
      const UNIT_ABBR = {
        villager: 'V',
        infantry: 'I',
        spearman: 'Sp',
        scout_cavalry: 'Sc',
        paladin: 'Pa',
        archer: 'Ar',
      }
      const BLDG_ABBR = {
        town_center: 'TC',
        barracks: 'Ba',
        stable: 'St',
        archery_range: 'AR',
      }

      const ALL_TERRAINS = [
        'plain',
        'forest',
        'mountain',
        'lake',
        'gold_mine',
        'stone_mine',
        'orchard',
        'deer',
      ]
      const ALL_UNIT_KINDS = [
        'villager',
        'infantry',
        'spearman',
        'scout_cavalry',
        'paladin',
        'archer',
      ]
      const ALL_BLDG_KINDS = [
        'town_center',
        'barracks',
        'stable',
        'archery_range',
      ]

      // ── Hex math — odd-r offset, pointy-top ────────────────────────────────────
      // Rows go left-to-right; odd rows are shifted right by half a hex.
      // The map dimensions come from the API response.

      function hexToPixel(q, r) {
        return {
          x: HEX_SIZE * SQRT3 * (q + 0.5 * (r & 1)),
          y: HEX_SIZE * 1.5 * r,
        }
      }

      // Returns the 6 pointy-top corner points for a hex centred at (cx, cy).
      function hexPath(ctx, cx, cy) {
        ctx.beginPath()
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i - Math.PI / 6 // pointy-top, 0° = right, -30° offset
          const px = cx + HEX_SIZE * Math.cos(angle)
          const py = cy + HEX_SIZE * Math.sin(angle)
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py)
        }
        ctx.closePath()
      }

      // Approximate pixel → axial hex (good enough for hover detection).
      function pixelToHex(px, py) {
        const r = Math.round(py / (HEX_SIZE * 1.5))
        const q = Math.round(px / (HEX_SIZE * SQRT3) - 0.5 * (r & 1))
        return { q, r }
      }

      // ── Zoom ───────────────────────────────────────────────────────────────────

      const ZOOM_KEY = 'aoe_zoom_v2' // bump version to reset stored values
      const ZOOM_MIN = 0.4
      const ZOOM_MAX = 2.0
      const ZOOM_STEP = 0.2

      let zoomScale = Math.min(
        ZOOM_MAX,
        Math.max(ZOOM_MIN, parseFloat(localStorage.getItem(ZOOM_KEY) || '1')),
      )

      function setZoom(scale) {
        zoomScale =
          Math.round(
            Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, scale)) / ZOOM_STEP,
          ) * ZOOM_STEP
        localStorage.setItem(ZOOM_KEY, zoomScale)
        document.getElementById('zoom-slider').value = zoomScale
        document.getElementById('zoom-label').textContent =
          Math.round(zoomScale * 100) + '%'
        drawMap()
      }

      function adjustZoom(delta) {
        setZoom(zoomScale + delta)
      }

      // ── Image cache ────────────────────────────────────────────────────────────

      const images = {} // path → HTMLImageElement (only populated on success)

      function loadImage(src) {
        return new Promise((resolve) => {
          const img = new Image()
          img.onload = () => {
            images[src] = img
            resolve()
          }
          img.onerror = () => resolve() // missing → silent fallback
          img.src = src
        })
      }

      async function preloadAssets() {
        const tasks = []
        for (const t of ALL_TERRAINS)
          tasks.push(loadImage(`assets/terrain/${t}.png`))
        for (const team of [1, 2]) {
          for (const k of ALL_UNIT_KINDS)
            tasks.push(loadImage(`assets/units/team${team}/${k}.png`))
          for (const k of ALL_BLDG_KINDS)
            tasks.push(loadImage(`assets/buildings/team${team}/${k}.png`))
        }
        await Promise.all(tasks)
      }

      // ── State ──────────────────────────────────────────────────────────────────

      let mapData = null
      let gameState = null
      let tileMap = {} // "q,r" → tile
      let entityMap = {} // "q,r" → [{type, data}]
      let sidebarVisible = true

      // ── Fetch ──────────────────────────────────────────────────────────────────

      async function fetchMap() {
        const res = await fetch('/map')
        mapData = await res.json()
        tileMap = {}
        for (const tile of mapData.tiles)
          tileMap[`${tile.coord.q},${tile.coord.r}`] = tile
      }

      async function fetchState() {
        const res = await fetch('/state/full')
        gameState = await res.json()
        entityMap = {}
        const add = (type, data) => {
          const k = `${data.position.q},${data.position.r}`
          ;(entityMap[k] = entityMap[k] || []).push({ type, data })
        }
        for (const u of gameState.team1.units || []) add('unit', u)
        for (const u of gameState.team2.units || []) add('unit', u)
        for (const b of gameState.team1.buildings || []) add('building', b)
        for (const b of gameState.team2.buildings || []) add('building', b)
      }

      // ── Draw ───────────────────────────────────────────────────────────────────

      function drawMap() {
        if (!mapData) return

        const canvas = document.getElementById('map-canvas')
        const ctx = canvas.getContext('2d')

        const mapWidth = mapData.width || 20
        const mapHeight = mapData.height || 15

        // Logical (unscaled) canvas size for an odd-r grid with API-driven dimensions.
        const logicalW = Math.ceil(HEX_SIZE * SQRT3 * (mapWidth + 0.5)) + PAD * 2
        const logicalH = Math.ceil(HEX_SIZE * (1.5 * (mapHeight - 1) + 2)) + PAD * 2

        // Physical canvas pixels = logical × zoom.
        canvas.width = Math.ceil(logicalW * zoomScale)
        canvas.height = Math.ceil(logicalH * zoomScale)

        ctx.clearRect(0, 0, canvas.width, canvas.height)
        ctx.save()
        ctx.scale(zoomScale, zoomScale)

        // ── 1. Terrain ──
        for (const tile of mapData.tiles) {
          const { x, y } = hexToPixel(tile.coord.q, tile.coord.r)
          const cx = x + PAD,
            cy = y + PAD

          // Fill with fallback colour first (always visible even if image missing).
          hexPath(ctx, cx, cy)
          ctx.fillStyle = TERRAIN_COLOR[tile.terrain] || '#444'
          ctx.fill()

          // Overlay PNG image if loaded, clipped to hex shape.
          const img = images[`assets/terrain/${tile.terrain}.png`]
          if (img) {
            ctx.save()
            hexPath(ctx, cx, cy)
            ctx.clip()
            const iw = HEX_SIZE * SQRT3
            const ih = HEX_SIZE * 2
            ctx.drawImage(img, cx - iw / 2, cy - ih / 2, iw, ih)
            ctx.restore()
          }

          // Grid line.
          hexPath(ctx, cx, cy)
          ctx.strokeStyle = 'rgba(0,0,0,0.3)'
          ctx.lineWidth = 0.5
          ctx.stroke()
        }

        if (!gameState) return

        // ── 2. Buildings ──
        for (const b of [
          ...(gameState.team1.buildings || []),
          ...(gameState.team2.buildings || []),
        ]) {
          const { x, y } = hexToPixel(b.position.q, b.position.r)
          const cx = x + PAD,
            cy = y + PAD
          const img = images[`assets/buildings/team${b.team}/${b.kind}.png`]

          if (img) {
            const s = HEX_SIZE * 1.5
            ctx.drawImage(img, cx - s / 2, cy - s / 2, s, s)
          } else {
            // Fallback: coloured square + abbreviation.
            const s = HEX_SIZE * 0.9
            ctx.fillStyle = TEAM_COLOR[b.team]
            ctx.strokeStyle = '#000'
            ctx.lineWidth = 1
            ctx.fillRect(cx - s / 2, cy - s / 2, s, s)
            ctx.strokeRect(cx - s / 2, cy - s / 2, s, s)
            ctx.fillStyle = '#fff'
            ctx.font = `bold ${HEX_SIZE * 0.45}px system-ui`
            ctx.textAlign = 'center'
            ctx.textBaseline = 'middle'
            ctx.fillText(BLDG_ABBR[b.kind] || b.kind[0].toUpperCase(), cx, cy)
          }
        }

        // ── 3. Units ──
        for (const u of [
          ...(gameState.team1.units || []),
          ...(gameState.team2.units || []),
        ]) {
          const { x, y } = hexToPixel(u.position.q, u.position.r)
          const cx = x + PAD,
            cy = y + PAD
          const img = images[`assets/units/team${u.team}/${u.kind}.png`]

          if (img) {
            const s = HEX_SIZE * 1.4
            ctx.drawImage(img, cx - s / 2, cy - s / 2, s, s)
          } else {
            // Fallback: coloured circle + abbreviation.
            const radius = HEX_SIZE * 0.55
            ctx.beginPath()
            ctx.arc(cx, cy, radius, 0, Math.PI * 2)
            ctx.fillStyle = TEAM_COLOR[u.team]
            ctx.fill()
            ctx.strokeStyle = '#000'
            ctx.lineWidth = 1
            ctx.stroke()
            ctx.fillStyle = '#fff'
            ctx.font = `bold ${HEX_SIZE * 0.42}px system-ui`
            ctx.textAlign = 'center'
            ctx.textBaseline = 'middle'
            ctx.fillText(UNIT_ABBR[u.kind] || u.kind[0].toUpperCase(), cx, cy)
          }
        }

        ctx.restore() // undo ctx.scale(zoomScale)
      }

      // ── Sidebar ────────────────────────────────────────────────────────────────

      function updateSidebar() {
        if (!gameState) return
        document.getElementById('tick-num').textContent = gameState.tick

        const setTeam = (prefix, team) => {
          const t = gameState[`team${team}`]
          document.getElementById(`${prefix}-food`).textContent =
            t.resources.food
          document.getElementById(`${prefix}-gold`).textContent =
            t.resources.gold
          document.getElementById(`${prefix}-stone`).textContent =
            t.resources.stone
          document.getElementById(`${prefix}-wood`).textContent =
            t.resources.wood
          document.getElementById(`${prefix}-units`).textContent = (
            t.units || []
          ).length
          document.getElementById(`${prefix}-buildings`).textContent = (
            t.buildings || []
          ).length

          const counts = {}
          for (const u of t.units || [])
            counts[u.kind] = (counts[u.kind] || 0) + 1
          const listEl = document.getElementById(`${prefix}-unit-list`)
          listEl.innerHTML = ''
          for (const [kind, n] of Object.entries(counts)) {
            const row = document.createElement('div')
            row.className = 'unit-row'
            row.innerHTML = `<span>${kind.replace(
              /_/g,
              ' ',
            )}</span><span>${n}</span>`
            listEl.appendChild(row)
          }
        }

        setTeam('t1', 1)
        setTeam('t2', 2)
      }

      function toggleSidebar() {
        sidebarVisible = !sidebarVisible
        const sidebar = document.getElementById('sidebar')
        const button = document.getElementById('sidebar-toggle')
        sidebar.classList.toggle('hidden', !sidebarVisible)
        button.textContent = sidebarVisible ? '❯' : '❮'
        button.setAttribute(
          'aria-label',
          sidebarVisible ? 'Hide sidebar' : 'Show sidebar',
        )
      }

      // ── Drag-to-pan ────────────────────────────────────────────────────────────

      const canvas = document.getElementById('map-canvas')
      const tooltip = document.getElementById('tooltip')
      const canvasWrap = document.getElementById('canvas-wrap')

      let isDragging = false
      let dragStartX = 0,
        dragStartY = 0
      let scrollStartX = 0,
        scrollStartY = 0

      canvas.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return
        isDragging = true
        dragStartX = e.clientX
        dragStartY = e.clientY
        scrollStartX = canvasWrap.scrollLeft
        scrollStartY = canvasWrap.scrollTop
        canvas.style.cursor = 'grabbing'
        tooltip.style.display = 'none'
        e.preventDefault()
      })

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return
        canvasWrap.scrollLeft = scrollStartX - (e.clientX - dragStartX)
        canvasWrap.scrollTop = scrollStartY - (e.clientY - dragStartY)
      })

      window.addEventListener('mouseup', () => {
        if (!isDragging) return
        isDragging = false
        canvas.style.cursor = 'grab'
      })

      // ── Tooltip on hover ────────────────────────────────────────────────────────

      canvas.addEventListener('mousemove', (e) => {
        if (isDragging) return

        const rect = canvas.getBoundingClientRect()
        // Convert screen px → logical canvas coords (undo zoom, undo PAD offset).
        const px = (e.clientX - rect.left) / zoomScale - PAD
        const py = (e.clientY - rect.top) / zoomScale - PAD
        const { q, r } = pixelToHex(px, py)
        const tile = tileMap[`${q},${r}`]
        const entities = entityMap[`${q},${r}`]

        if (
          !tile ||
          q < 0 ||
          q >= (mapData?.width || 20) ||
          r < 0 ||
          r >= (mapData?.height || 15)
        ) {
          tooltip.style.display = 'none'
          return
        }

        let html = `<b>(${q}, ${r})</b> ${tile.terrain.replace(/_/g, ' ')}`
        if (entities) {
          for (const { type, data } of entities) {
            html += `<br>Team ${data.team} · ${data.kind.replace(
              /_/g,
              ' ',
            )} HP ${data.hp}/${data.max_hp}`
          }
        }

        tooltip.innerHTML = html
        tooltip.style.display = 'block'
        tooltip.style.left = e.clientX + 14 + 'px'
        tooltip.style.top = e.clientY + 14 + 'px'
      })

      canvas.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none'
      })

      // ── Live dot ───────────────────────────────────────────────────────────────

      function flashDot() {
        const dot = document.getElementById('live-dot')
        dot.classList.add('live')
        setTimeout(() => dot.classList.remove('live'), 600)
      }

      // ── Main loop ──────────────────────────────────────────────────────────────

      async function fetchAndDraw() {
        try {
          if (!mapData) await fetchMap()
          await fetchState()
          drawMap()
          updateSidebar()
          flashDot()
        } catch (err) {
          console.error('fetch error', err)
        }
      }

      // Mouse-wheel zoom on the canvas.
      canvas.addEventListener(
        'wheel',
        (e) => {
          e.preventDefault()
          adjustZoom(e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP)
        },
        { passive: false },
      )

      // Initialise slider + label from restored zoom.
      document.getElementById('zoom-slider').value = zoomScale
      document.getElementById('zoom-label').textContent =
        Math.round(zoomScale * 100) + '%'

      // Preload assets and kick off the first fetch in parallel.
      // Re-draw after assets finish in case the first draw used fallbacks.
      preloadAssets().then(() => {
        if (mapData) drawMap()
      })
      fetchAndDraw()
      setInterval(fetchAndDraw, 3000)
    </script>
  </body>
</html>
